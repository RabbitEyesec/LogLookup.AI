<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- LogLookup AI application icon: green node-chain mark on black glass -->
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#0e1f17"/>
      <stop offset="100%" stop-color="#050807"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"
        stroke="rgba(52,211,153,0.35)" stroke-width="2"/>
  <!-- attack chain: three correlated nodes -->
  <path d="M 34 88 L 60 56 L 88 68 L 98 34" fill="none"
        stroke="url(#edge)" stroke-width="6" stroke-linecap="round"
        stroke-linejoin="round" opacity="0.9"/>
  <circle cx="34" cy="88" r="10" fill="#050807" stroke="#34d399" stroke-width="5"/>
  <circle cx="60" cy="56" r="8" fill="#050807" stroke="#34d399" stroke-width="5"/>
  <circle cx="88" cy="68" r="8" fill="#050807" stroke="#34d399" stroke-width="5"/>
  <circle cx="98" cy="34" r="11" fill="#10b981"/>
  <circle cx="98" cy="34" r="4.5" fill="#04110b"/>
</svg>
